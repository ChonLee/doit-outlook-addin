<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Send to Vikunja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2333;
      --border: #2a3045;
      --accent: #7c6af7;
      --accent-hover: #6b5ce6;
      --green: #4ade80;
      --red: #f87171;
      --text: #e2e8f0;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .btn-icon {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      font-size: 16px;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-icon:hover { color: var(--text); }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input, textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    input[type="password"] { font-family: 'DM Mono', monospace; letter-spacing: 1px; }
    textarea { resize: vertical; }
    select option { background: var(--surface2); }

    .field { margin-bottom: 12px; }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .hint a { color: var(--accent); text-decoration: none; }

    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-full { width: 100%; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:not(:disabled):hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn-row .btn { flex: 1; }

    .status {
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 10px;
      display: none;
    }
    .status.show { display: block; }
    .status.success { background: rgba(74,222,128,0.12); color: var(--green); }
    .status.error   { background: rgba(248,113,113,0.12); color: var(--red); }
    .status.info    { background: rgba(124,106,247,0.12); color: var(--accent); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    #settingsView, #mainView { display: none; }
    #settingsView.active, #mainView.active { display: block; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="logo">Send to Vikunja</span>
    <button class="btn-icon" id="btnSettings" title="Settings">&#9881;</button>
  </div>

  <!-- Settings view -->
  <div id="settingsView">
    <div class="field">
      <label>Vikunja Instance URL</label>
      <input type="url" id="cfgUrl" placeholder="https://your-vikunja.example.com"/>
    </div>
    <div class="field">
      <label>Vikunja API Token</label>
      <input type="password" id="cfgToken" placeholder="Paste your API token"/>
      <p class="hint">Vikunja &rarr; Settings &rarr; API Tokens &rarr; Create token</p>
    </div>
    <div class="field">
      <label>Default Project ID <span style="font-weight:400;text-transform:none">(optional)</span></label>
      <input type="text" id="cfgProject" placeholder="e.g. 3"/>
    </div>
    <div class="field">
      <label>Anthropic API Key</label>
      <input type="password" id="cfgApiKey" placeholder="sk-ant-..."/>
      <p class="hint">Required for AI summarize. Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
    </div>
    <button class="btn btn-primary btn-full" id="btnSaveSettings">Save Settings</button>
  </div>

  <!-- Main view -->
  <div id="mainView">

    <div id="statusMsg" class="status"></div>

    <div class="field">
      <label>Paste Teams Message</label>
      <textarea id="pasteArea" rows="5" placeholder="Paste the Teams message content here..."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnAI">&#10022; Summarize with AI</button>
      <button class="btn btn-secondary" id="btnRaw">Use as-is</button>
    </div>

    <hr class="divider"/>

    <div class="section-label">Task Details</div>

    <div class="field">
      <label>Title</label>
      <input type="text" id="taskTitle" placeholder="Task title"/>
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="taskDesc" rows="4" placeholder="Task description"></textarea>
    </div>
    <div class="field">
      <label>Project</label>
      <select id="taskProject">
        <option value="">Loading projects...</option>
      </select>
    </div>
    <div class="field">
      <label>Due Date <span style="font-weight:400;text-transform:none">(optional)</span></label>
      <input type="date" id="taskDue"/>
    </div>

    <button class="btn btn-primary btn-full" id="btnSend">Create Task</button>
  </div>

</div>
<script>
  let settings = { url: '', token: '', defaultProject: '', apiKey: '' };

  function loadSettings() {
    settings.url            = localStorage.getItem('vk_url')     || '';
    settings.token          = localStorage.getItem('vk_token')   || '';
    settings.defaultProject = localStorage.getItem('vk_project') || '';
    settings.apiKey         = localStorage.getItem('vk_apikey')  || '';
  }

  function saveSettings() {
    settings.url            = document.getElementById('cfgUrl').value.trim().replace(/\/$/, '');
    settings.token          = document.getElementById('cfgToken').value.trim();
    settings.defaultProject = document.getElementById('cfgProject').value.trim();
    settings.apiKey         = document.getElementById('cfgApiKey').value.trim();
    localStorage.setItem('vk_url',     settings.url);
    localStorage.setItem('vk_token',   settings.token);
    localStorage.setItem('vk_project', settings.defaultProject);
    localStorage.setItem('vk_apikey',  settings.apiKey);
  }

  function showSettings() {
    document.getElementById('cfgUrl').value     = settings.url;
    document.getElementById('cfgToken').value   = settings.token;
    document.getElementById('cfgProject').value = settings.defaultProject;
    document.getElementById('cfgApiKey').value  = settings.apiKey;
    document.getElementById('settingsView').classList.add('active');
    document.getElementById('mainView').classList.remove('active');
  }

  function showMain() {
    document.getElementById('settingsView').classList.remove('active');
    document.getElementById('mainView').classList.add('active');
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status show ' + type;
  }

  function hideStatus() {
    document.getElementById('statusMsg').className = 'status';
  }

  async function loadProjects() {
    const sel = document.getElementById('taskProject');
    sel.innerHTML = '';
    if (!settings.url || !settings.token) return;
    try {
      const resp = await fetch(settings.url + '/api/v1/projects', {
        headers: { 'Authorization': 'Bearer ' + settings.token }
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const projects = await resp.json();
      const list = Array.isArray(projects) ? projects : [];
      let defaultSet = false;
      list.forEach(function(p) {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.title;
        if (String(p.id) === settings.defaultProject) {
          opt.selected = true;
          defaultSet = true;
        }
        sel.appendChild(opt);
      });
      if (!defaultSet && sel.options.length > 0) sel.options[0].selected = true;
    } catch(e) {
      sel.innerHTML = '<option value="">Could not load projects</option>';
    }
  }

  async function handleAI() {
    const content = document.getElementById('pasteArea').value.trim();
    if (!content) { showStatus('Paste a Teams message first.', 'error'); return; }
    if (!settings.apiKey) { showStatus('No Anthropic API key — add it in settings.', 'error'); return; }

    const btn = document.getElementById('btnAI');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Summarizing...';
    hideStatus();

    const prompt = 'You are an assistant that turns messages into actionable task summaries.\n\n' +
      'Message content:\n' + content + '\n\n' +
      'Return ONLY a JSON object:\n' +
      '{"title": "short action-oriented task title", "description": "concise 1-3 sentence summary of what needs to be done"}\n' +
      'No markdown, no explanation, just the JSON.';

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': settings.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(function(){ return {}; });
        throw new Error(err.error ? err.error.message : 'HTTP ' + resp.status);
      }

      const data = await resp.json();
      const raw = data.content[0].text.trim().replace(/^```json?\s*/i, '').replace(/```$/, '').trim();
      const parsed = JSON.parse(raw);

      document.getElementById('taskTitle').value = parsed.title || '';
      document.getElementById('taskDesc').value  = parsed.description || '';
      showStatus('AI summary ready — review and edit before sending.', 'success');
    } catch(e) {
      showStatus('AI error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '&#10022; Summarize with AI';
    }
  }

  function handleRaw() {
    const content = document.getElementById('pasteArea').value.trim();
    if (!content) { showStatus('Paste a Teams message first.', 'error'); return; }
    const lines = content.split('\n').filter(function(l){ return l.trim(); });
    document.getElementById('taskTitle').value = lines[0] ? lines[0].slice(0, 100) : 'Task from Teams';
    document.getElementById('taskDesc').value  = content.slice(0, 2000);
    hideStatus();
  }

  async function handleSend() {
    const title   = document.getElementById('taskTitle').value.trim();
    const desc    = document.getElementById('taskDesc').value.trim();
    const project = document.getElementById('taskProject').value;
    const due     = document.getElementById('taskDue').value;

    if (!title)   { showStatus('Please enter a task title.', 'error'); return; }
    if (!project) { showStatus('Please select a project.', 'error'); return; }
    if (!settings.url || !settings.token) { showStatus('Configure Vikunja settings first.', 'error'); return; }

    const btn = document.getElementById('btnSend');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating...';
    hideStatus();

    const payload = { title: title, description: desc };
    if (due) payload.due_date = new Date(due).toISOString();

    try {
      const resp = await fetch(settings.url + '/api/v1/projects/' + project + '/tasks', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + settings.token
        },
        body: JSON.stringify(payload)
      });

      if (!resp.ok) {
        const err = await resp.json().catch(function(){ return {}; });
        throw new Error(err.message || 'HTTP ' + resp.status);
      }

      showStatus('Task created!', 'success');
      document.getElementById('pasteArea').value  = '';
      document.getElementById('taskTitle').value  = '';
      document.getElementById('taskDesc').value   = '';
      document.getElementById('taskDue').value    = '';
      setTimeout(hideStatus, 3000);
    } catch(e) {
      showStatus('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create Task';
    }
  }

  function bindEvents() {
    document.getElementById('btnSettings').addEventListener('click', function() {
      document.getElementById('cfgUrl').value     = settings.url;
      document.getElementById('cfgToken').value   = settings.token;
      document.getElementById('cfgProject').value = settings.defaultProject;
      document.getElementById('cfgApiKey').value  = settings.apiKey;
      showSettings();
    });
    document.getElementById('btnSaveSettings').addEventListener('click', function() {
      saveSettings();
      showMain();
      loadProjects();
    });
    document.getElementById('btnAI').addEventListener('click', handleAI);
    document.getElementById('btnRaw').addEventListener('click', handleRaw);
    document.getElementById('btnSend').addEventListener('click', handleSend);
  }

  loadSettings();
  if (!settings.url || !settings.token) {
    showSettings();
  } else {
    showMain();
    loadProjects();
  }
  bindEvents();
</script>
</body>
</html>
